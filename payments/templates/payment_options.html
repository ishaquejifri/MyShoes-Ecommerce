{% extends "user_base.html" %}

{% block title %}Payment Options{% endblock %}

{% block content %}


<h2 class="text-2xl font-bold mb-6">
    Choose Payment Method
</h2>

<p class="mb-5 text-gray-600">
    Wallet Balance :
    <strong>₹{{ wallet.balance }}</strong>
</p>

<form method="POST">
    {% csrf_token %}

    <label class="block border rounded-lg p-4 mb-4 cursor-pointer">
        <input type="radio"
               name="payment_method"
               value="online"
               checked>

        <span class="ml-2">
            Online Payment
        </span>
    </label>

    <label class="block border rounded-lg p-4 mb-4">

    <input
        type="radio"
        name="payment_method"
        value="wallet"
        {% if wallet.balance < order.total_amount %}disabled{% endif %}
    >

    Wallet

    {% if wallet.balance < order.total_amount %}
        <span class="text-red-500 text-sm">
            (Insufficient Balance)
        </span>
    {% endif %}

</label>

    {% if order.total_amount <= 2000 %}
    <label class="block border rounded-lg p-4 mb-4 cursor-pointer">
        <input type="radio"
               name="payment_method"
               value="cod">

        <span class="ml-2">
            Cash on Delivery
        </span>
    </label>
    {% endif %}

    <button type="submit"
            class="w-full bg-blue-600 text-white py-3 rounded-lg">
        Continue
    </button>

</form>


{% endblock %}
