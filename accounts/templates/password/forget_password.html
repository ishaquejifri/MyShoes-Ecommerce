<!doctype html>
<html>
  <head>
    <title>Forgot Password</title>

    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Noto+Sans:wght@400;500;700;900&display=swap"
    />

    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  </head>

  <body
    class="bg-neutral-50"
    style="font-family: Manrope, &quot;Noto Sans&quot;, sans-serif"
  >
    <!-- Header -->
    <header
      class="flex items-center justify-between border-b px-6 py-3 bg-white"
    >
      <div class="flex items-center gap-3 text-[#131615]">
        <a href="{% url 'home' %}">
        <h2 class="text-lg font-bold">Lotto Shoes</h2>
        </a>
      </div>

      <div class="flex gap-6 text-sm font-medium">
        <a href="#">Formal</a>
        <a href="#">Casual</a>
        <a href="#">Running</a>
      </div>
    </header>

    <!-- Forgot Password Card -->
    <div class="flex items-center justify-center min-h-screen px-4">
      <div class="w-full max-w-md bg-white rounded-xl shadow-md p-6">
         {% if messages %}
           <div id="message-box" class="max-w-md mx-auto mt-4">
           {% for message in messages %}
          <div class="mb-3 px-4 py-3 rounded-md text-sm
          {% if message.tags == 'error' %}
          bg-red-100 text-red-700 border border-red-300
          {% elif message.tags == 'success' %}
          bg-green-100 text-green-700 border border-green-300
          {% elif message.tags == 'warning' %}
          bg-yellow-100 text-yellow-700 border border-yellow-300
          {% else %}
          bg-blue-100 text-blue-700 border border-blue-300
          {% endif %}
          ">
          {{ message }}
          </div>
          {% endfor %}
          </div>
          {% endif %}
        <h1 class="text-xl font-bold text-center mb-2">Forgot Password?</h1>

        <p class="text-sm text-gray-600 text-center mb-6">
          Enter your email address and we will send you an OTP to reset your
          password.
        </p>

        <form method="POST">
          {% csrf_token %}

          <label class="block mb-4">
            <p class="text-sm font-medium mb-1">Email Address</p>

            <input
              type="email"
              name="email"
              placeholder="Enter your email"
              required
              class="w-full border border-gray-300 rounded-lg h-11 px-3 text-sm focus:ring-0 focus:border-gray-400"
            />
          </label>

          <button
            type="submit"
            class="w-full h-10 bg-[#222f2e] text-white rounded-lg font-semibold text-sm hover:bg-[#1b2423]"
          >
            Send OTP
          </button>
        </form>

        <p class="text-center text-sm mt-4">
          <a
            href="{% url 'login' %}"
            class="text-[#222f2e] font-medium underline"
          >
            Back to Sign In
          </a>
        </p>
      </div>
    </div>

    <!-- Footer -->
    <footer class="text-center py-6 text-sm text-gray-500">
      ©2024 Footwear Co. All rights reserved.
    </footer>

<script>
      setTimeout(function() {
        const messageBox = document.getElementById("message-box");
        if (messageBox) {
          messageBox.style.display = "none";
        }
      }, 5000); // 5000ms = 5 seconds
</script> 

  </body>
</html>
```
