<html>
  <head>
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin="" />
    <link
      rel="stylesheet"
      as="style"
      onload="this.rel='stylesheet'"
      href="https://fonts.googleapis.com/css2?display=swap&amp;family=Manrope%3Awght%40400%3B500%3B700%3B800&amp;family=Noto+Sans%3Awght%40400%3B500%3B700%3B900"
    />

    <title>New Password</title>
    <link rel="icon" type="image/x-icon" href="data:image/x-icon;base64," />

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  </head>
  <body>
    <div class="relative flex h-auto min-h-screen w-full flex-col bg-white group/design-root overflow-x-hidden" style='font-family: Manrope, "Noto Sans", sans-serif;'>
      <div class="layout-container flex h-full grow flex-col">
        <header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-b-[#f2f3f2] px-10 py-3">
          <div class="flex items-center gap-4 text-[#141514]">
            <div class="size-4">
              <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">

                  fill-rule="evenodd"
                  clip-rule="evenodd"

                  fill="currentColor"
                ></path>
                <path
                  fill-rule="evenodd"
                  clip-rule="evenodd"
                  d="M24 8.18819L33.4123 11.574L24 15.2071L14.5877 11.574L24 8.18819ZM9 15.8487L21 20.4805V37.6263L9 32.9945V15.8487ZM27 37.6263V20.4805L39 15.8487V32.9945L27 37.6263ZM25.354 2.29885C24.4788 1.98402 23.5212 1.98402 22.646 2.29885L4.98454 8.65208C3.7939 9.08038 3 10.2097 3 11.475V34.3663C3 36.0196 4.01719 37.5026 5.55962 38.098L22.9197 44.7987C23.6149 45.0671 24.3851 45.0671 25.0803 44.7987L42.4404 38.098C43.9828 37.5026 45 36.0196 45 34.3663V11.475C45 10.2097 44.2061 9.08038 43.0155 8.65208L25.354 2.29885Z"
                  fill="currentColor"
                ></path>
              </svg>
            </div>
            <a href="{% url 'home' %}">
            <h2 class="text-[#141514] text-lg font-bold leading-tight tracking-[-0.015em]">Lotto Shoes</h2>
            </a>
          </div>
          <div class="flex flex-1 justify-end gap-8">
            <div class="flex items-center gap-9">
              <a class="text-[#141514] text-sm font-medium leading-normal" href="#">Formal</a>
              <a class="text-[#141514] text-sm font-medium leading-normal" href="#">Casual</a>
              <a class="text-[#141514] text-sm font-medium leading-normal" href="#">Running</a>              
            </div>
            <div class="flex gap-2">
              
              <button
                class="flex max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-10 bg-[#f2f3f2] text-[#141514] gap-2 text-sm font-bold leading-normal tracking-[0.015em] min-w-0 px-2.5"
              >
                <div class="text-[#141514]" data-icon="User" data-size="20px" data-weight="regular">
                  <svg xmlns="http://www.w3.org/2000/svg" width="20px" height="20px" fill="currentColor" viewBox="0 0 256 256">
                    <path
                      d="M230.92,212c-15.23-26.33-38.7-45.21-66.09-54.16a72,72,0,1,0-73.66,0C63.78,166.78,40.31,185.66,25.08,212a8,8,0,1,0,13.85,8c18.84-32.56,52.14-52,89.07-52s70.23,19.44,89.07,52a8,8,0,1,0,13.85-8ZM72,96a56,56,0,1,1,56,56A56.06,56.06,0,0,1,72,96Z"
                    ></path>
                  </svg>
                </div>
              </button>
              <button
                class="flex max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-10 bg-[#f2f3f2] text-[#141514] gap-2 text-sm font-bold leading-normal tracking-[0.015em] min-w-0 px-2.5"
              >
                <div class="text-[#141514]" data-icon="ShoppingBag" data-size="20px" data-weight="regular">
                  <svg xmlns="http://www.w3.org/2000/svg" width="20px" height="20px" fill="currentColor" viewBox="0 0 256 256">
                    <path
                      d="M216,40H40A16,16,0,0,0,24,56V200a16,16,0,0,0,16,16H216a16,16,0,0,0,16-16V56A16,16,0,0,0,216,40Zm0,160H40V56H216V200ZM176,88a48,48,0,0,1-96,0,8,8,0,0,1,16,0,32,32,0,0,0,64,0,8,8,0,0,1,16,0Z"
                    ></path>
                  </svg>
                </div>
              </button>
            </div>
          </div>
        </header>
        
        <div class="px-6 flex flex-1 justify-center py-4">
          {% if messages %}
          <div id="message-box" class="max-w-md mx-auto mt-4">
          {% for message in messages %}
          <div class="mb-3 px-4 py-3 rounded-md text-sm
          {% if message.tags == 'error' %}
          bg-red-100 text-red-700 border border-red-300
          {% elif message.tags == 'success' %}
          bg-green-100 text-green-700 border border-green-300
          {% elif message.tags == 'warning' %}
          bg-yellow-100 text-yellow-700 border border-yellow-300
          {% else %}
          bg-blue-100 text-blue-700 border border-blue-300
          {% endif %}
          ">
          {{ message }}
          </div>
          {% endfor %}
          </div>
          {% endif %}
          <form method='POST' id="new-password-form" novalidate>
          {% csrf_token %}
          <div class="layout-content-container flex flex-col w-[380px] max-w-[380px] py-4 flex-1">
            <h1 class="text-[#141514] text-[18px] font-bold leading-tight tracking-[-0.015em] px-4 text-center pb-3 pt-5">Set New Password</h1>
            <p class="text-[#141514] text-base font-normal leading-normal pb-3 pt-1 px-4 text-center">Please enter your new password below.</p>
            <div class="flex max-w-[480px] flex-wrap items-end gap-4 px-4 py-2">
              <label class="flex flex-col min-w-40 flex-1">
                <p class="text-[#141514] text-sm font-medium leading-normal pb-2">New Password</p>
                <input
                  type='password'
                  id='password'
                  name='password'
                  placeholder="Enter your new password"
                  class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-[#141514] focus:outline-0 focus:ring-0 border border-[#e0e1e1] bg-white focus:border-[#e0e1e1] h-10 placeholder:text-[#737876] p-[10px] text-base font-normal leading-normal"
                  value=""
                  required
                />
                <p id="error-password" class="text-red-500 text-xs mt-1 hidden"></p>
              </label>
            </div>
            <div class="flex max-w-[480px] flex-wrap items-end gap-4 px-4 py-2">
              <label class="flex flex-col min-w-40 flex-1">
                <p class="text-[#141514] text-sm font-medium leading-normal pb-2">Confirm New Password</p>
                <input
                  type='password'
                  id='confirm_password'
                  name='confirm_password'
                  placeholder="Confirm your new password"
                  class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-[#141514] focus:outline-0 focus:ring-0 border border-[#e0e1e1] bg-white focus:border-[#e0e1e1] h-10 placeholder:text-[#737876] p-[10px] text-base font-normal leading-normal"
                  value=""
                  required
                />
                <p id="error-confirm_password" class="text-red-500 text-xs mt-1 hidden"></p>
              </label>
            </div>

            <script>
            document.addEventListener("DOMContentLoaded", function() {
              const form = document.getElementById("new-password-form");
              const fields = {
                password: {
                  el: document.getElementById("password"),
                  err: document.getElementById("error-password"),
                  validate: (val) => {
                    if (!val) return "Password is required.";
                    if (val.length < 8) return "Password must be at least 8 characters long.";
                    if (!/[a-z]/.test(val)) return "Password must contain at least one lowercase letter.";
                    if (!/[A-Z]/.test(val)) return "Password must contain at least one uppercase letter.";
                    if (!/[0-9]/.test(val)) return "Password must contain at least one number.";
                    if (!/[@$%&*!?]/.test(val)) return "Password must contain at least one special character.";
                    return "";
                  }
                },
                confirm_password: {
                  el: document.getElementById("confirm_password"),
                  err: document.getElementById("error-confirm_password"),
                  validate: (val) => {
                    if (!val) return "Confirm password is required.";
                    const passwordVal = document.getElementById("password").value;
                    if (val !== passwordVal) return "Passwords do not match.";
                    return "";
                  }
                }
              };

              function validateField(name) {
                const field = fields[name];
                if (!field) return true;
                const errorMsg = field.validate(field.el.value);
                if (errorMsg) {
                  field.err.textContent = errorMsg;
                  field.err.classList.remove("hidden");
                  field.el.classList.add("border-red-500", "focus:ring-red-400");
                  field.el.classList.remove("border-[#e0e1e1]");
                  return false;
                } else {
                  field.err.textContent = "";
                  field.err.classList.add("hidden");
                  field.el.classList.remove("border-red-500", "focus:ring-red-400");
                  field.el.classList.add("border-[#e0e1e1]");
                  return true;
                }
              }

              Object.keys(fields).forEach(name => {
                const field = fields[name];
                field.el.addEventListener("blur", () => validateField(name));
                field.el.addEventListener("input", () => {
                  if (!field.err.classList.contains("hidden")) {
                    validateField(name);
                  }
                });
              });

              form.addEventListener("submit", function(e) {
                let isValid = true;
                let firstInvalidField = null;

                Object.keys(fields).forEach(name => {
                  const fieldValid = validateField(name);
                  if (!fieldValid) {
                    isValid = false;
                    if (!firstInvalidField) {
                      firstInvalidField = fields[name].el;
                    }
                  }
                });

                if (!isValid) {
                  e.preventDefault();
                  if (firstInvalidField) {
                    firstInvalidField.focus();
                  }
                }
              });
            });
            </script>

            <div class="flex px-4 py-3">
              <button
                type='submit'
                class="flex min-w-[84px] max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-9 px-3 flex-1 bg-[#1c211f] text-white text-sm font-bold leading-normal tracking-[0.015em]"
              >
                <span class="truncate">Reset Password</span>
              </button>
            </div>
          </div>
        </form>
        </div>
        <footer class="flex justify-center">
          <div class="flex max-w-[960px] flex-1 flex-col">
            <footer class="flex flex-col gap-6 px-5 py-10 text-center @container">
              <div class="flex flex-wrap items-center justify-center gap-6 @[480px]:flex-row @[480px]:justify-around">
                <a class="text-[#737876] text-sm font-normal leading-normal min-w-40" href="#">About Us</a>
                <a class="text-[#737876] text-sm font-normal leading-normal min-w-40" href="#">Contact</a>
                <a class="text-[#737876] text-sm font-normal leading-normal min-w-40" href="#">FAQ</a>
                <a class="text-[#737876] text-sm font-normal leading-normal min-w-40" href="#">Returns &amp; Exchanges</a>
                <a class="text-[#737876] text-sm font-normal leading-normal min-w-40" href="#">Privacy Policy</a>
              </div>
              <div class="flex flex-wrap justify-center gap-4">
                <a href="#">
                  <div class="text-[#737876]" data-icon="TwitterLogo" data-size="24px" data-weight="regular">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24px" height="24px" fill="currentColor" viewBox="0 0 256 256">
                      <path
                        d="M247.39,68.94A8,8,0,0,0,240,64H209.57A48.66,48.66,0,0,0,168.1,40a46.91,46.91,0,0,0-33.75,13.7A47.9,47.9,0,0,0,120,88v6.09C79.74,83.47,46.81,50.72,46.46,50.37a8,8,0,0,0-13.65,4.92c-4.31,47.79,9.57,79.77,22,98.18a110.93,110.93,0,0,0,21.88,24.2c-15.23,17.53-39.21,26.74-39.47,26.84a8,8,0,0,0-3.85,11.93c.75,1.12,3.75,5.05,11.08,8.72C53.51,229.7,65.48,232,80,232c70.67,0,129.72-54.42,135.75-124.44l29.91-29.9A8,8,0,0,0,247.39,68.94Zm-45,29.41a8,8,0,0,0-2.32,5.14C196,166.58,143.28,216,80,216c-10.56,0-18-1.4-23.22-3.08,11.51-6.25,27.56-17,37.88-32.48A8,8,0,0,0,92,169.08c-.47-.27-43.91-26.34-44-96,16,13,45.25,33.17,78.67,38.79A8,8,0,0,0,136,104V88a32,32,0,0,1,9.6-22.92A30.94,30.94,0,0,1,167.9,56c12.66.16,24.49,7.88,29.44,19.21A8,8,0,0,0,204.67,80h16Z"
                      ></path>
                    </svg>
                  </div>
                </a>
                <a href="#">
                  <div class="text-[#737876]" data-icon="InstagramLogo" data-size="24px" data-weight="regular">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24px" height="24px" fill="currentColor" viewBox="0 0 256 256">
                      <path
                        d="M128,80a48,48,0,1,0,48,48A48.05,48.05,0,0,0,128,80Zm0,80a32,32,0,1,1,32-32A32,32,0,0,1,128,160ZM176,24H80A56.06,56.06,0,0,0,24,80v96a56.06,56.06,0,0,0,56,56h96a56.06,56.06,0,0,0,56-56V80A56.06,56.06,0,0,0,176,24Zm40,152a40,40,0,0,1-40,40H80a40,40,0,0,1-40-40V80A40,40,0,0,1,80,40h96a40,40,0,0,1,40,40ZM192,76a12,12,0,1,1-12-12A12,12,0,0,1,192,76Z"
                      ></path>
                    </svg>
                  </div>
                </a>
                <a href="#">
                  <div class="text-[#737876]" data-icon="FacebookLogo" data-size="24px" data-weight="regular">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24px" height="24px" fill="currentColor" viewBox="0 0 256 256">
                      <path
                        d="M128,24A104,104,0,1,0,232,128,104.11,104.11,0,0,0,128,24Zm8,191.63V152h24a8,8,0,0,0,0-16H136V112a16,16,0,0,1,16-16h16a8,8,0,0,0,0-16H152a32,32,0,0,0-32,32v24H96a8,8,0,0,0,0,16h24v63.63a88,88,0,1,1,16,0Z"
                      ></path>
                    </svg>
                  </div>
                </a>
              </div>
              <p class="text-[#737876] text-base font-normal leading-normal">@2026 Lotto Shoes. All rights reserved.</p>
            </footer>
          </div>
        </footer>
      </div>
    </div>
    <script>
      setTimeout(function() {
        const messageBox = document.getElementById("message-box");
        if (messageBox) {
          messageBox.style.display = "none";
        }
      }, 5000); // 5000ms = 5 seconds
</script> 
  </body>
</html>
