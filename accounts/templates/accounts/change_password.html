            <h1
              class="text-[#121617] text-2xl font-bold leading-tight tracking-[-0.015em] mb-8 text-center"
            >
              Change Password
            </h1>
            <form method='POST' id="change-password-form" novalidate>
              {% csrf_token%}  

              <div class="mb-3">
                <label class="block text-sm font-medium mb-1">Current Password</label>
                <div class="relative">
                  <input
                    type="password"
                    id="current_password"
                    name="current_password"
                    placeholder="Enter current password"
                    class="w-full border border-gray-300 rounded-md h-10 px-3 pr-10 focus:outline-none focus:ring-1 focus:ring-gray-400"
                    required
                  />
                  <!-- Eye Button -->
                  <button
                    type="button"
                    onclick="togglePassword('current_password')"
                    class="absolute right-2 top-2 text-gray-500"
                  >
                    👁
                  </button>
                </div>
                <p id="error-current_password" class="text-red-500 text-xs mt-1 hidden"></p>
              </div>

              <div class="mb-3">
                <label class="block text-sm font-medium mb-1">New Password</label>
                <div class="relative">
                  <input
                    type="password"
                    id="new_password"
                    name="new_password"
                    placeholder="Enter new password"
                    class="w-full border border-gray-300 rounded-md h-10 px-3 pr-10 focus:outline-none focus:ring-1 focus:ring-gray-400"
                    required
                  />
                  <!-- Eye Button -->
                  <button
                    type="button"
                    onclick="togglePassword('new_password')"
                    class="absolute right-2 top-2 text-gray-500"
                  >
                    👁
                  </button>
                </div>
                <p id="error-new_password" class="text-red-500 text-xs mt-1 hidden"></p>
              </div>

              <div class="mb-3">
                <label class="block text-sm font-medium mb-1">Confirm Password</label>
                <div class="relative">
                  <input
                    type="password"
                    id="confirm_new_password"
                    name="confirm_new_password"
                    placeholder="Enter confirm password"
                    class="w-full border border-gray-300 rounded-md h-10 px-3 pr-10 focus:outline-none focus:ring-1 focus:ring-gray-400"
                    required
                  />
                  <!-- Eye Button -->
                  <button
                    type="button"
                    onclick="togglePassword('confirm_new_password')"
                    class="absolute right-2 top-2 text-gray-500"
                  >
                    👁
                  </button>
                </div>
                <p id="error-confirm_new_password" class="text-red-500 text-xs mt-1 hidden"></p>
              </div>

              <script>
                function togglePassword(fieldId) {
                  const passwordField = document.getElementById(fieldId);
                  if (passwordField.type === "password") {
                    passwordField.type = "text";
                  } else {
                    passwordField.type = "password";
                  }
                }

                document.addEventListener("DOMContentLoaded", function() {
                  const form = document.getElementById("change-password-form");
                  const fields = {
                    current_password: {
                      el: document.getElementById("current_password"),
                      err: document.getElementById("error-current_password"),
                      validate: (val) => {
                        if (!val) return "Current password is required.";
                        return "";
                      }
                    },
                    new_password: {
                      el: document.getElementById("new_password"),
                      err: document.getElementById("error-new_password"),
                      validate: (val) => {
                        if (!val) return "New password is required.";
                        if (val.length < 8) return "New password must be at least 8 characters long.";
                        if (!/[a-z]/.test(val)) return "Password must contain at least one lowercase letter.";
                        if (!/[A-Z]/.test(val)) return "Password must contain at least one uppercase letter.";
                        if (!/[0-9]/.test(val)) return "Password must contain at least one number.";
                        if (!/[@$%&*!?]/.test(val)) return "Password must contain at least one special character.";
                        const currentVal = document.getElementById("current_password").value;
                        if (val === currentVal) return "New password cannot be same as old password.";
                        return "";
                      }
                    },
                    confirm_new_password: {
                      el: document.getElementById("confirm_new_password"),
                      err: document.getElementById("error-confirm_new_password"),
                      validate: (val) => {
                        if (!val) return "Confirm password is required.";
                        const newVal = document.getElementById("new_password").value;
                        if (val !== newVal) return "New passwords do not match.";
                        return "";
                      }
                    }
                  };

                  function validateField(name) {
                    const field = fields[name];
                    if (!field) return true;
                    const errorMsg = field.validate(field.el.value);
                    if (errorMsg) {
                      field.err.textContent = errorMsg;
                      field.err.classList.remove("hidden");
                      field.el.classList.add("border-red-500", "focus:ring-red-400");
                      field.el.classList.remove("border-gray-300", "focus:ring-gray-400");
                      return false;
                    } else {
                      field.err.textContent = "";
                      field.err.classList.add("hidden");
                      field.el.classList.remove("border-red-500", "focus:ring-red-400");
                      field.el.classList.add("border-gray-300", "focus:ring-gray-400");
                      return true;
                    }
                  }

                  Object.keys(fields).forEach(name => {
                    const field = fields[name];
                    field.el.addEventListener("blur", () => validateField(name));
                    field.el.addEventListener("input", () => {
                      if (!field.err.classList.contains("hidden")) {
                        validateField(name);
                      }
                    });
                  });

                  form.addEventListener("submit", function(e) {
                    let isValid = true;
                    let firstInvalidField = null;

                    Object.keys(fields).forEach(name => {
                      const fieldValid = validateField(name);
                      if (!fieldValid) {
                        isValid = false;
                        if (!firstInvalidField) {
                          firstInvalidField = fields[name].el;
                        }
                      }
                    });

                    if (!isValid) {
                      e.preventDefault();
                      if (firstInvalidField) {
                        firstInvalidField.focus();
                      }
                    }
                  });
                });
              </script>
              <button type="submit"
                class="w-full mt-3 bg-black text-white h-9 rounded-lg font-bold">
                Change Password
              </button>
            </form>
