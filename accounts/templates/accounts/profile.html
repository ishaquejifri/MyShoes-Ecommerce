{% extends "user_base.html" %}
{% block title %}Profile{% endblock %}
{% block content %}

        
            <div class="flex flex-wrap justify-between gap-3 p-4">
              <p
                class="text-[#121617] tracking-light text-[32px] font-bold leading-tight min-w-72"
              >
                Profile: {{request.user.first_name}} {{request.user.last_name}}
              </p>
            </div>
            <div class="flex p-4 @container">
              <div class="flex w-full flex-col gap-4 items-center">
                <div class="flex gap-4 flex-col items-center">
                  <div class="w-32 h-32 rounded-full overflow-hidden">
                    {% if request.user.profile_image %}
                    <img
                      src="{{ request.user.profile_image.url }}"
                      class="w-full h-full object-cover"
                    />
                    {% else %}
                    <img
                      src="https://via.placeholder.com/150"
                      class="w-full h-full object-cover"
                    />
                    {% endif %}
                  </div>

                  <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    <input type="file" name="profile_image" class="mt-3" />
                    <button
                      type="submit"
                      class="mt-2 bg-black text-white px-3 py-1 rounded"
                    >
                      Upload
                    </button>
                  </form>

                  <p
                    class="text-[#121617] text-[22px] font-bold leading-tight tracking-[-0.015em] text-center"
                  ></p>
                </div>
              </div>
            </div>
            <h3
              class="text-[#121617] text-lg font-bold leading-tight tracking-[-0.015em] px-4 pb-2 pt-4"
            >
              Personal Details
            </h3>
            <div class="flex max-w-[480px] flex-wrap items-end gap-4 px-4 py-3">
              <label class="flex flex-col min-w-40 flex-1">
                <p
                  class="text-[#121617] text-base font-medium leading-normal pb-2"
                >
                  First Name
                </p>
                <input
                  class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-[#121617] focus:outline-0 focus:ring-0 border border-[#dde3e4] bg-white focus:border-[#dde3e4] h-14 placeholder:text-[#677f83] p-[15px] text-base font-normal leading-normal"
                  value="{{request.user.first_name}}"
                  readonly
                />
              </label>
            </div>
            <div class="flex max-w-[480px] flex-wrap items-end gap-4 px-4 py-3">
              <label class="flex flex-col min-w-40 flex-1">
                <p
                  class="text-[#121617] text-base font-medium leading-normal pb-2"
                >
                  Last Name
                </p>
                <input
                  class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-[#121617] focus:outline-0 focus:ring-0 border border-[#dde3e4] bg-white focus:border-[#dde3e4] h-14 placeholder:text-[#677f83] p-[15px] text-base font-normal leading-normal"
                  value="{{request.user.last_name}}"
                  readonly
                />
              </label>
            </div>
            <div class="flex max-w-[480px] flex-wrap items-end gap-4 px-4 py-3">
              <label class="flex flex-col min-w-40 flex-1">
                <p
                  class="text-[#121617] text-base font-medium leading-normal pb-2"
                >
                  Email Address
                </p>
                <input
                  class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-[#121617] focus:outline-0 focus:ring-0 border border-[#dde3e4] bg-white focus:border-[#dde3e4] h-14 placeholder:text-[#677f83] p-[15px] text-base font-normal leading-normal"
                  value="{{request.user.email}}"
                  readonly
                />
              </label>
            </div>
            <div class="flex max-w-[480px] flex-wrap items-end gap-4 px-4 py-3">
              <label class="flex flex-col min-w-40 flex-1">
                <p
                  class="text-[#121617] text-base font-medium leading-normal pb-2"
                >
                  Phone Number
                </p>
                <input
                  class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-[#121617] focus:outline-0 focus:ring-0 border border-[#dde3e4] bg-white focus:border-[#dde3e4] h-14 placeholder:text-[#677f83] p-[15px] text-base font-normal leading-normal"
                  value="{{request.user.phone}}"
                  readonly
                />
              </label>
            </div>
            <div class="flex max-w-[480px] flex-wrap items-end gap-4 px-4 py-3">
              <label class="flex flex-col min-w-40 flex-1">
                <p
                  class="text-[#121617] text-base font-medium leading-normal pb-2"
                >
                  Member Since
                </p>
                <input
                  class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-[#121617] focus:outline-0 focus:ring-0 border border-[#dde3e4] bg-white focus:border-[#dde3e4] h-14 placeholder:text-[#677f83] p-[15px] text-base font-normal leading-normal"
                  value="{{request.user.date_joined}}"
                  readonly
                />
              </label>
            </div>
            <div class="flex max-w-[480px] flex-wrap items-end gap-4 px-4 py-3">
              <label class="flex flex-col min-w-40 flex-1">
                <p
                  class="text-[#121617] text-base font-medium leading-normal pb-2"
                >
                  Last Login
                </p>
                <input
                  class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-[#121617] focus:outline-0 focus:ring-0 border border-[#dde3e4] bg-white focus:border-[#dde3e4] h-14 placeholder:text-[#677f83] p-[15px] text-base font-normal leading-normal"
                  value="{{request.user.last_login}}"
                  readonly
                />
              </label>
            </div>

            <!-- Referral Code Section -->
            <div class="flex max-w-[480px] flex-wrap items-end gap-4 px-4 py-3">
              <label class="flex flex-col min-w-40 flex-1">
                <p class="text-[#121617] text-base font-medium leading-normal pb-2">
                  Your Referral Code
                </p>
                <div class="flex gap-2 items-center">
                  <input
                    id="referral-code-field"
                    class="form-input flex flex-1 resize-none overflow-hidden rounded-lg text-[#121617] focus:outline-0 focus:ring-0 border border-[#dde3e4] bg-amber-50 focus:border-[#dde3e4] h-14 placeholder:text-[#677f83] p-[15px] text-base font-bold leading-normal tracking-widest"
                    value="{{ request.user.referral_code }}"
                    readonly
                  />
                  <button
                    type="button"
                    onclick="copyReferralCode()"
                    class="h-14 px-4 bg-[#298fa3] text-white rounded-lg text-sm font-bold hover:bg-[#1f7a8c] transition-colors"
                    title="Copy referral code"
                  >
                    Copy
                  </button>
                </div>
                <p class="text-xs text-gray-500 mt-1">
                  Share this code with friends. When they sign up, you get a ₹500 reward coupon!
                </p>
              </label>
            </div>

            <script>
            function copyReferralCode() {
                var codeField = document.getElementById('referral-code-field');
                navigator.clipboard.writeText(codeField.value).then(function() {
                    var btn = event.target.closest('button');
                    var original = btn.innerText;
                    btn.innerText = 'Copied!';
                    btn.classList.add('bg-green-600');
                    setTimeout(function() {
                        btn.innerText = original;
                        btn.classList.remove('bg-green-600');
                    }, 2000);
                });
            }
            </script>

            <div class="flex gap-4 px-4 py-3 justify-start">
              <button
                class="flex min-w-[84px] max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-10 px-4 bg-[#298fa3] text-white text-sm font-bold leading-normal tracking-[0.015em]"
              >
                <a href="{% url 'edit_profile'%}">
                  <span class="truncate">Edit Profile</span>
                </a>
              </button>

              <button
                class="flex min-w-[84px] max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-10 px-4 bg-[#298fa3] text-white text-sm font-bold leading-normal tracking-[0.015em]"
              >
                <a href="{% url 'change_password'%}">
                  <span class="truncate">Change Password</span>
                </a>
              </button>

              <button
                class="flex min-w-[84px] max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-10 px-4 bg-[#298fa3] text-white text-sm font-bold leading-normal tracking-[0.015em]"
              >
                <a href="{% url 'change_email'%}">
                  <span class="truncate">Change Email</span>
                </a>
              </button>
            </div>
          </div>
        </div>

{% endblock %}
