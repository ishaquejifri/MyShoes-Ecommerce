{% extends 'admin_base.html' %}

{% block title %} Edit Coupon - {{ coupon.code }} {% endblock %}
{% block content %}

<div class="p-6">

```
<div class="flex justify-between items-center mb-8">
    <div>
        <h1 class="text-3xl font-bold text-white">
            Edit Coupon
        </h1>
        <p class="text-gray-400">
            Edit coupon
        </p>
    </div>

    <a href="{% url 'coupon_list' %}"
       class="bg-[#273a32] text-white px-5 py-2 rounded-lg">
        Back
    </a>
</div>

<div class="bg-[#1b2822] rounded-xl p-8">

    <form method="POST">
        {% csrf_token %}

        <div class="grid md:grid-cols-2 gap-6">

            <div>
                <label class="text-gray-300">Coupon Code *</label>
                <input type="text"
                    name="code"
                    value="{{ coupon.code }}"
                    class="w-full bg-[#273a32] border border-[#39564a] rounded-lg px-4 py-3 text-white">
            </div>

            <div>
                <label class="text-gray-300">Description</label>
                <textarea name="description"
                          class="w-full bg-[#273a32] border border-[#39564a] rounded-lg px-4 py-3 text-white">{{ coupon.description }}</textarea>
            </div>

            <div>
                <label class="text-gray-300">Discount Type</label>

                <select name="discount_type"
                        id="discountType"
                        class="w-full bg-[#273a32] border border-[#39564a] rounded-lg px-4 py-3 text-white">

                    <option value="fixed"
                    {% if coupon.discount_type == 'fixed' %}selected{% endif %}>
                        Fixed Amount
                    </option>

                    <option value="percentage"
                    {% if coupon.discount_type == 'percentage' %}selected{% endif %}>
                        Percentage
                    </option>

                </select>
            </div>

            <div id="fixedDiv">
                <label class="text-gray-300">
                    Discount Amount
                </label>

                <input type="number"
                       step="0.01"
                       name="discount_amount"
                       value="{{ coupon.discount_amount }}"
                       class="w-full bg-[#273a32] border border-[#39564a] rounded-lg px-4 py-3 text-white">
            </div>

            <div id="percentageDiv" style="display:none;">
                <label class="text-gray-300">
                    Discount Percentage
                </label>

                <input type="number"
                       step="0.01"
                       name="discount_percentage"
                       value="{{ coupon.discount_percentage }}"
                       class="w-full bg-[#273a32] border border-[#39564a] rounded-lg px-4 py-3 text-white">
            </div>

            <div>
                <label class="text-gray-300">
                    Minimum Purchase
                </label>

                <input type="number"
                       step="0.01"
                       name="min_purchase_amount"
                       value="{{ coupon.min_purchase_amount }}"
                       class="w-full bg-[#273a32] border border-[#39564a] rounded-lg px-4 py-3 text-white">
            </div>

            <div>
                <label class="text-gray-300">
                    Usage Limit
                </label>

                <input type="number"
                       name="usage_limit"
                       value="{{ coupon.usage_limit }}"
                       class="w-full bg-[#273a32] border border-[#39564a] rounded-lg px-4 py-3 text-white">
            </div>

            <div>
                <label class="text-gray-300">
                    Start Date *
                </label>

                <input type="date"
                       name="start_date"
                       min="{{ today }}"
                       value="{{ coupon.start_date|date:'Y-m-d' }}"
                       class="w-full bg-[#273a32] border border-[#39564a] rounded-lg px-4 py-3 text-white">
            </div>

            <div>
                <label class="text-gray-300">
                    End Date *
                </label>

                <input type="date"
                       name="end_date"
                       value="{{ coupon.end_date|date:'Y-m-d' }}"
                       class="w-full bg-[#273a32] border border-[#39564a] rounded-lg px-4 py-3 text-white">
            </div>

            <div>
                <label class="inline-flex items-center gap-2">
                    <input type="checkbox"
                           name="one_time_use"
                           {% if coupon.one_time_use %}checked{% endif %}>
                    <span class="text-white">
                        One Time Use
                    </span>
                </label>
            </div>

            <div>
                <label class="inline-flex items-center gap-2">
                    <input type="checkbox"
                           name="is_active"
                           {% if coupon.is_active %}checked{% endif %}>
                    <span class="text-white">
                        Active
                    </span>
                </label>
            </div>

        </div>

        <div class="mt-8">
            <button type="submit"
                    class="bg-[#00cc77] text-black font-semibold px-6 py-3 rounded-lg">
                Save Coupon
            </button>
        </div>

    </form>

</div>
```

</div>

<script>
const type = document.getElementById('discountType');
const fixedDiv = document.getElementById('fixedDiv');
const percentageDiv = document.getElementById('percentageDiv');

function toggleFields() {
    if (type.value === 'fixed') {
        fixedDiv.style.display = 'block';
        percentageDiv.style.display = 'none';
    } else {
        fixedDiv.style.display = 'none';
        percentageDiv.style.display = 'block';
    }
}

toggleFields();
type.addEventListener('change', toggleFields);
</script>

{% endblock %}
