                    <p class="text-white text-sm font-medium leading-normal">Settings</p>

                </div>
              </div>
              <button
                class="flex min-w-[84px] max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-10 px-4 bg-[#0ac275] text-[#111815] text-sm font-bold leading-normal tracking-[0.015em]"
              >
                <span class="truncate">Logout</span>
              </button>
            </div>
          </div>
          <div class="layout-content-container flex flex-col max-w-[960px] flex-1">
            <div class="flex flex-wrap justify-between gap-3 p-4">
              <p class="text-white tracking-light text-[32px] font-bold leading-tight min-w-72">Edit Category</p>
              <a href="{% url 'category_list'%}">
              <button
                class="flex min-w-[84px] max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-8 px-4 bg-[#283932] text-white text-sm font-medium leading-normal"
              >
                <span class="truncate">Back to Categories</span>
              </button>
            </a>
            </div>
            <form method="POST" enctype="multipart/form-data">
              {% csrf_token %}
            <div class="p-4 @container">
              <div class="flex flex-col md:flex-row items-start gap-6 rounded-lg">
               <img 
                    id='imagePreview'
                    src="{% if category.image %} {{ category.image.url}} {% else %} /static/default.jpg {% endif %}"
                    class="w-full max-w-[250px] h-40 object-cover rounded-lg border border-[#283932]"/>
                <div class="flex w-full min-w-72 grow flex-col items-stretch justify-center gap-1 py-4 @xl:px-4">
                  <p class="text-white text-lg font-bold leading-tight tracking-[-0.015em]">Category Thumbnail</p>
                  <div class="flex items-end gap-3 justify-between">
                    <p class="text-[#9cbaad] text-base font-normal leading-normal">Upload an image for the category</p>
                  <label class="flex min-w-[84px] max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-8 px-4 bg-[#0ac275] text-[#111815] text-sm font-medium leading-normal">
                    <span class="truncate">Edit Image</span>
                    <input type="file" name="image" class="hidden" onchange="previewImage(event)">
                  </label>
                  </div>
                </div>
              </div>
            </div>
            
            <div class="flex max-w-[480px] flex-wrap items-end gap-4 px-4 py-3">
              <label class="flex flex-col min-w-40 flex-1">
                <p class="text-white text-base font-medium leading-normal pb-2">Category Name</p>
                <input
                  type='text'
                  name='name'                  
                  class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-white focus:outline-0 focus:ring-0 border-none bg-[#283932] focus:border-none h-14 placeholder:text-[#9cbaad] p-4 text-base font-normal leading-normal"
                  value="{{category.name}}"
                  required
                />
              </label>
            </div>
            <div class="flex max-w-[480px] flex-wrap items-end gap-4 px-4 py-3">
              <label class="flex flex-col min-w-40 flex-1">
                <p class="text-white text-base font-medium leading-normal pb-2">Description</p>
                <textarea
                name='description'                
                  class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-white focus:outline-0 focus:ring-0 border-none bg-[#283932] focus:border-none min-h-36 placeholder:text-[#9cbaad] p-4 text-base font-normal leading-normal"
                >{{ category.description }}</textarea>
              </label>
            </div>
            
            <div class="flex justify-stretch">
              <div class="flex flex-1 gap-3 flex-wrap px-4 py-3 justify-end">
                <button type="submit"
                  class="flex min-w-[84px] max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-10 px-4 bg-[#0ac275] text-[#111815] text-sm font-bold leading-normal tracking-[0.015em]"
                >
                  <span class="truncate">Update Category</span>
                </button>
              </form> 
              <a href="{% url 'category_list'%}"> 
                <button
                  class="flex min-w-[84px] max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-10 px-4 bg-[#283932] text-white text-sm font-bold leading-normal tracking-[0.015em]"
                >
                  <span class="truncate">Cancel</span>
                </button>
              </a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

      <script>
        function previewImage(event) {
          const reader = new FileReader();
          reader.onload = function () {
          document.getElementById('imagePreview').src = reader.result;
        };
        reader.readAsDataURL(event.target.files[0]);
        }
      </script>

  </body>
</html>
